name: PR Checks

on:
  workflow_call:
    inputs:
      java-version:
        type: string
        required: false
        default: '25'
      node-version:
        required: false
        default: '22'
        type: string

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ inputs.java-version }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}

      - name: Run Tests
        run: mvn test -B
